<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="ペットショップ" />
<meta name="theme-color" content="#bfe9ff" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="assets/icon-180.png" />
<link rel="icon" href="assets/icon-180.png" />
<title>ペットショップ</title>
<style>
  :root{
    --sky:#bfe9ff; --grass:#bfe9a8; --pink:#ff7eb3; --cream:#fff7ef;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overscroll-behavior:none; }
  body{
    font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4",sans-serif;
    color:#5a3d2b; user-select:none; -webkit-user-select:none;
    background:var(--sky);
  }
  #app{ position:fixed; inset:0; overflow:hidden; }
  .screen{
    position:absolute; inset:0; display:none;
    flex-direction:column; align-items:center; justify-content:center;
    padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
  }
  .screen.active{ display:flex; animation:fadein .35s ease; }
  @keyframes fadein{ from{opacity:0} to{opacity:1} }

  /* ---------- Opening ---------- */
  #opening{ background:linear-gradient(#cdecff,#eaf7ff); }
  .shop{ position:relative; width:min(74vw,560px); }
  .shop img{ width:100%; height:auto; display:block; filter:drop-shadow(0 10px 18px rgba(90,120,160,.25)); }
  /* カウンター（店員さんの下）に置く肉球ボタン */
  .paw-btn{
    position:absolute; top:72%; left:50%; transform:translate(-50%,-50%);
    width:128px; height:128px; border:none; border-radius:50%; cursor:pointer;
    background:radial-gradient(circle at 38% 32%, #ffd0e6 0%, #ff7eb8 48%, #ff4f9e 100%);
    border:6px solid #fff; box-shadow:0 8px 0 #e23e86, 0 12px 22px rgba(226,62,134,.45);
    display:flex; align-items:center; justify-content:center;
    animation:pawpulse 1.2s ease-in-out infinite;
  }
  .paw-btn .paw{ font-size:66px; line-height:1; }
  .paw-btn:active{ transform:translate(-50%,-50%) scale(.9); box-shadow:0 3px 0 #e23e86; }
  @keyframes pawpulse{ 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.08)} }
  .paw-label{
    position:absolute; top:calc(72% + 70px); left:50%; transform:translateX(-50%);
    font-size:17px; font-weight:bold; color:#e0568a; white-space:nowrap;
    text-shadow:0 1px 0 #fff,0 0 6px #fff;
  }

  /* ---------- Choose ---------- */
  #choose{
    background:linear-gradient(#d8f3ff,#eafff1); justify-content:flex-start;
    padding-top:max(24px,env(safe-area-inset-top));
    padding-bottom:calc(env(safe-area-inset-bottom) + 40px);
    overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain;
  }
  .title{ font-size:34px; font-weight:bold; color:#4a7bd0; margin:8px 0 6px; }
  .subtitle{ font-size:20px; color:#7a8aa0; margin-bottom:20px; }
  .pets{
    display:grid; grid-template-columns:1fr 1fr; gap:20px;
    width:100%; max-width:640px;
  }
  .pet-card{
    position:relative;
    background:#fff; border-radius:24px; padding:10px 6px 8px;
    box-shadow:0 6px 0 rgba(120,140,170,.18); border:3px solid #fff;
    display:flex; flex-direction:column; align-items:center;
    transition:transform .12s ease; cursor:pointer;
  }
  .pet-card:active{ transform:scale(.94); }
  .pet-card img{ width:100%; height:150px; object-fit:contain; }
  .pet-card .name{ font-size:22px; font-weight:bold; margin-top:2px; }
  .pet-card.locked{ opacity:.82; }
  .pet-card.locked img{ filter:grayscale(.25); }
  .pet-card.locked .name{ color:#9aa7b8; }
  .pet-card.wide{ grid-column:1 / -1; }
  .badge{
    position:absolute; top:-8px; right:-6px; z-index:2;
    background:#ffce3a; color:#7a5500; font-size:16px; font-weight:bold;
    padding:5px 14px; border-radius:999px; transform:rotate(6deg);
    box-shadow:0 3px 0 #e0a800; border:2px solid #fff;
  }

  /* ---------- Care ---------- */
  #care{
    background:
      radial-gradient(120% 60% at 50% 116%, #aee59a 0 40%, transparent 41%),
      linear-gradient(#cdeeff 0 58%, #d8f6c9 58% 100%);
    justify-content:flex-end;
  }
  .meter-wrap{
    position:absolute; top:max(18px,env(safe-area-inset-top)); left:0; right:0;
    display:flex; flex-direction:column; align-items:center; gap:6px; pointer-events:none;
  }
  .meter-label{ font-size:22px; font-weight:bold; color:#e0568a; }
  .hearts{ display:flex; gap:10px; }
  .hearts .h{ font-size:42px; line-height:1; transition:opacity .2s ease, transform .2s ease; }
  .hearts .h.justfilled{ animation:heartpop .4s ease; }
  @keyframes heartpop{ 0%{transform:scale(1)} 40%{transform:scale(1.45)} 100%{transform:scale(1)} }
  .pet-stage{ position:relative; width:100%; max-width:480px; flex:1; display:flex; align-items:center; justify-content:center; }
  #petImg{
    width:min(70vw,460px); height:auto; cursor:pointer;
    animation:breathe 2.6s ease-in-out infinite;
    filter:drop-shadow(0 12px 10px rgba(90,80,60,.18));
  }
  @keyframes breathe{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.035)} }
  #petImg.wiggle{ animation:wiggle .5s ease; }
  @keyframes wiggle{
    0%{transform:scale(1) rotate(0)} 20%{transform:scale(1.08) rotate(-5deg)}
    40%{transform:scale(1.06) rotate(5deg)} 60%{transform:scale(1.07) rotate(-3deg)}
    80%{transform:scale(1.05) rotate(2deg)} 100%{transform:scale(1) rotate(0)}
  }
  .talk{
    position:absolute; top:18%; left:50%; transform:translateX(-50%) scale(0);
    background:#fff; color:#e0568a; font-weight:bold; font-size:26px;
    padding:8px 18px; border-radius:999px; box-shadow:0 4px 0 #ffd5e6;
    white-space:nowrap; pointer-events:none;
  }
  .talk.show{ animation:pop .9s ease; }
  @keyframes pop{ 0%{transform:translateX(-50%) scale(0)} 25%{transform:translateX(-50%) scale(1.1)} 70%{transform:translateX(-50%) scale(1)} 100%{transform:translateX(-50%) scale(0)} }

  .float-heart{ position:absolute; width:64px; height:auto; pointer-events:none; will-change:transform,opacity; animation:rise 1s ease-out forwards; z-index:5; }
  @keyframes rise{ 0%{transform:translate(-50%,-50%) scale(.4); opacity:0} 15%{opacity:1} 100%{transform:translate(-50%,-180%) scale(1.2); opacity:0} }

  .back{
    position:absolute; top:max(14px,env(safe-area-inset-top)); left:14px;
    width:48px; height:48px; border-radius:50%; border:none; background:#ffffffcc;
    font-size:24px; box-shadow:0 4px 0 rgba(120,140,170,.25); cursor:pointer; z-index:8;
  }
  .back:active{ transform:scale(.92); }

  /* ---------- コイン ---------- */
  .coin-badge{
    position:absolute; top:max(14px,env(safe-area-inset-top)); right:14px; z-index:9;
    display:flex; align-items:center; gap:5px;
    background:#fff8e1; color:#a9760a; font-weight:bold; font-size:20px;
    padding:7px 15px 7px 11px; border-radius:999px;
    box-shadow:0 4px 0 rgba(200,160,40,.35); border:2px solid #ffe9a8;
  }
  /* 金色のコイン（絵文字だと銀色＝月っぽくなるのでCSSで自作） */
  .coin{
    display:inline-block; width:1em; height:1em; border-radius:50%; vertical-align:-0.16em;
    background:radial-gradient(circle at 36% 30%, #fff6c0 0%, #ffd23e 42%, #f4a200 100%);
    border:0.09em solid #e08e00; position:relative;
    box-shadow:inset 0 -0.09em 0.02em rgba(170,105,0,.45), inset 0 0.06em 0.03em rgba(255,255,255,.75);
  }
  .coin::after{
    content:"★"; position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size:0.58em; color:#f0a000; text-shadow:0 0.02em 0 rgba(255,255,255,.55);
  }
  .coin-badge .coin{ font-size:24px; }
  .coin-badge.bump{ animation:coinbump .4s ease; }
  @keyframes coinbump{ 0%{transform:scale(1)} 40%{transform:scale(1.3)} 100%{transform:scale(1)} }

  /* ご褒美の演出 */
  .reward{
    position:absolute; inset:0; z-index:20; display:none;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,.16); pointer-events:none;
  }
  .reward.show{ display:flex; }
  .reward-card{
    background:#fff; border-radius:28px; padding:24px 36px; text-align:center;
    box-shadow:0 12px 32px rgba(0,0,0,.25);
    animation:rewardpop .5s cubic-bezier(.2,1.5,.5,1);
  }
  @keyframes rewardpop{ 0%{transform:scale(0)} 100%{transform:scale(1)} }
  .reward-emoji{ font-size:62px; line-height:1; animation:spin 1s ease; }
  @keyframes spin{ 0%{transform:rotateY(0)} 100%{transform:rotateY(720deg)} }
  .reward-text{ font-size:27px; font-weight:bold; color:#e0a000; margin-top:6px; line-height:1.2; }
  .coin-burst{ position:absolute; pointer-events:none; z-index:21; }

  /* ---------- カートボタン（おみせへ） ---------- */
  .cart-btn{
    position:absolute; top:max(14px,env(safe-area-inset-top)); right:14px; z-index:9;
    width:54px; height:54px; border-radius:50%; border:none; cursor:pointer;
    background:radial-gradient(circle at 38% 30%, #fff0b8 0%, #ffce5a 55%, #f5a623 100%);
    border:3px solid #fff; box-shadow:0 5px 0 #d98e00, 0 8px 14px rgba(217,142,0,.4);
    display:flex; align-items:center; justify-content:center; font-size:26px; line-height:1;
  }
  .cart-btn:active{ transform:scale(.9); box-shadow:0 2px 0 #d98e00; }
  /* care画面では右上にコインがあるので、その左隣に置く */
  #care .cart-btn{ right:auto; left:14px; top:max(72px,calc(env(safe-area-inset-top) + 58px)); }

  /* ---------- おみせ（ショップ） ---------- */
  #shop{
    background:linear-gradient(#fff2cf,#fff8ea); justify-content:flex-start;
    padding-top:max(24px,env(safe-area-inset-top));
    padding-bottom:calc(env(safe-area-inset-bottom) + 40px);
    overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain;
  }
  #shop .title{ color:#e09600; }
  .shop-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; width:100%; max-width:640px; margin-top:6px; }
  .food-card{
    position:relative; background:#fff; border-radius:22px; padding:10px 6px 10px;
    box-shadow:0 6px 0 rgba(200,160,40,.22); border:3px solid #fff;
    display:flex; flex-direction:column; align-items:center;
  }
  .food-card img{ width:100%; height:96px; object-fit:contain; pointer-events:none; }
  .food-card .fname{ font-size:18px; font-weight:bold; margin-top:4px; }
  .food-card .have{
    position:absolute; top:-8px; left:-6px; z-index:2;
    background:#7ec8ff; color:#fff; font-size:15px; font-weight:bold;
    min-width:26px; padding:3px 8px; border-radius:999px; text-align:center;
    box-shadow:0 3px 0 #3f9ee0; border:2px solid #fff;
  }
  .buy-btn{
    margin-top:8px; border:none; cursor:pointer; font-weight:bold; color:#fff;
    font-size:17px; padding:9px 14px; border-radius:999px;
    display:flex; align-items:center; gap:5px; line-height:1;
    background:linear-gradient(#ffb43e,#ff9500); box-shadow:0 4px 0 #d97a00;
  }
  .buy-btn .coin{ font-size:18px; }
  .buy-btn:active{ transform:scale(.93); box-shadow:0 1px 0 #d97a00; }
  .buy-btn.shake{ animation:shake .4s; }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 50%{transform:translateX(6px)} 75%{transform:translateX(-4px)} }
  .shop-note{ font-size:16px; color:#b08a3a; margin-top:18px; text-align:center; }
  .fly-food{ position:fixed; width:70px; height:auto; pointer-events:none; z-index:30; will-change:transform,opacity; }

  /* ---------- ごはんバー（care画面の下） ---------- */
  .food-bar{
    position:absolute; bottom:max(18px,calc(env(safe-area-inset-bottom) + 12px)); left:0; right:0;
    display:flex; gap:14px; align-items:flex-end; justify-content:center; z-index:8;
  }
  .food-slot{
    position:relative; width:74px; height:74px; border-radius:18px; cursor:pointer;
    background:#ffffffcc; border:3px solid #fff; box-shadow:0 4px 0 rgba(120,140,170,.22);
    display:flex; align-items:center; justify-content:center;
  }
  .food-slot img{ width:74%; height:74%; object-fit:contain; pointer-events:none; }
  .food-slot.empty{ opacity:.45; filter:grayscale(.5); }
  .food-slot:active{ transform:scale(.9); }
  .food-slot .cnt{
    position:absolute; top:-8px; right:-8px; min-width:24px;
    background:#ff7eb3; color:#fff; font-size:14px; font-weight:bold;
    padding:2px 7px; border-radius:999px; text-align:center; border:2px solid #fff;
    box-shadow:0 2px 0 #e0568a;
  }

  /* ---------- iPadを基準（default）に。以下はスマホ等の小さい画面向けに縮小 ---------- */
  @media (max-width:699px){
    .shop{ width:min(92vw,440px); }
    .paw-btn{ width:104px; height:104px; }
    .paw-btn .paw{ font-size:54px; }
    .title{ font-size:26px; }
    .subtitle{ font-size:16px; margin-bottom:14px; }
    .pets{ max-width:440px; gap:14px; }
    .pet-card img{ height:104px; }
    .pet-card .name{ font-size:18px; }
    .badge{ font-size:13px; padding:4px 11px; top:-8px; }
    .meter-label{ font-size:17px; }
    .hearts .h{ font-size:33px; }
    .hearts{ gap:6px; }
    #petImg{ width:min(82vw,360px); }
    .talk{ font-size:20px; }
    .float-heart{ width:52px; }
    .coin-badge{ font-size:18px; }
    .coin-badge .coin{ font-size:20px; }
    .cart-btn{ width:46px; height:46px; font-size:22px; }
    .shop-grid{ gap:10px; }
    .food-card img{ height:74px; }
    .food-card .fname{ font-size:15px; }
    .buy-btn{ font-size:15px; padding:8px 12px; }
    .food-slot{ width:60px; height:60px; }
    .food-bar{ gap:10px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- 1. オープニング -->
  <section id="opening" class="screen active">
    <div class="shop">
      <img src="assets/petshop.png" alt="ペットショップ" />
      <button class="paw-btn" id="startBtn" aria-label="はじめる"><span class="paw">🐾</span></button>
      <div class="paw-label">タップしてはじめる</div>
    </div>
    <button class="cart-btn" data-shop aria-label="おみせ">🛒</button>
  </section>

  <!-- 2. ペットをえらぶ -->
  <section id="choose" class="screen">
    <div class="coin-badge" id="coinBadge2"><span class="coin"></span><span class="coinNum">0</span></div>
    <button class="cart-btn" data-shop aria-label="おみせ" style="top:max(70px,calc(env(safe-area-inset-top) + 56px))">🛒</button>
    <div class="title">どの子とあそぶ？</div>
    <div class="subtitle">すきなペットをえらんでね</div>
    <div class="pets">
      <div class="pet-card" data-pet="dog"><img src="assets/dog.png" alt="いぬ"><div class="name">いぬ</div></div>
      <div class="pet-card locked" data-pet="cat"><span class="badge">もうすぐ</span><img src="assets/cat.png" alt="ねこ"><div class="name">ねこ</div></div>
      <div class="pet-card locked" data-pet="rabbit"><span class="badge">もうすぐ</span><img src="assets/rabbit.png" alt="うさぎ"><div class="name">うさぎ</div></div>
      <div class="pet-card locked" data-pet="hamster"><span class="badge">もうすぐ</span><img src="assets/hamster.png" alt="ハムスター"><div class="name">ハムスター</div></div>
      <div class="pet-card locked wide" data-pet="pig"><span class="badge">もうすぐ</span><img src="assets/pig.png" alt="ぶた" style="height:84px"><div class="name">ぶた</div></div>
    </div>
  </section>

  <!-- 3. なでる -->
  <section id="care" class="screen">
    <button class="back" id="backBtn" aria-label="もどる">‹</button>
    <button class="cart-btn" data-shop aria-label="おみせ">🛒</button>
    <div class="coin-badge" id="coinBadge"><span class="coin"></span><span id="coinCount" class="coinNum">0</span></div>
    <div class="reward" id="reward">
      <div class="reward-card">
        <div class="reward-emoji"><span class="coin"></span></div>
        <div class="reward-text">10コイン<br>ゲット！</div>
      </div>
    </div>
    <div class="meter-wrap">
      <div class="meter-label">なつきど</div>
      <div class="hearts" id="hearts">
        <span class="h">🖤</span><span class="h">🖤</span><span class="h">🖤</span><span class="h">🖤</span><span class="h">🖤</span>
      </div>
    </div>
    <div class="pet-stage" id="stage">
      <div class="talk" id="talk">だいすき！</div>
      <img id="petImg" src="assets/dog.png" alt="ペット" />
    </div>
    <div class="food-bar" id="foodBar"></div>
  </section>

  <!-- 4. おみせ -->
  <section id="shop" class="screen">
    <button class="back" id="shopBack" aria-label="もどる">‹</button>
    <div class="coin-badge"><span class="coin"></span><span class="coinNum">0</span></div>
    <div class="title">おみせ</div>
    <div class="subtitle">コインでごはんをかおう</div>
    <div class="shop-grid" id="shopGrid"></div>
    <div class="shop-note">ごはんをあげると<br>ペットがよろこぶよ 🍴</div>
  </section>

</div>

<script>
  const KEY_AFF = "petApp.affection.v2";
  const KEY_PET = "petApp.pet";

  const screens = {
    opening: document.getElementById("opening"),
    choose:  document.getElementById("choose"),
    care:    document.getElementById("care"),
    shop:    document.getElementById("shop"),
  };
  let prevScreen = "opening";
  function show(name){
    const cur = Object.keys(screens).find(k => screens[k].classList.contains("active"));
    if (cur && cur !== "shop") prevScreen = cur;
    Object.values(screens).forEach(s => s.classList.remove("active"));
    screens[name].classList.add("active");
    if (name === "shop") renderShop();
    if (name === "care")  renderFoodBar();
  }

  // ---- なつき度 ----
  let affection = parseInt(localStorage.getItem(KEY_AFF) || "0", 10);
  if (isNaN(affection)) affection = 0;
  const heartEls = [...document.querySelectorAll("#hearts .h")];
  const PER = 100 / heartEls.length;   // ハート1個ぶんの割合（20）
  let prevFull = -1;                   // 直前まで満タンだったハート数
  function renderMeter(animate){
    let nowFull = 0;
    heartEls.forEach((el,i) => {
      let f = (affection - i*PER) / PER;        // このハートの満ち具合 0〜1
      f = Math.max(0, Math.min(1, f));
      if (f <= 0){                               // まだ → 黒
        el.textContent = "🖤";
        el.style.opacity = 1;
        el.style.transform = "scale(1)";
      } else {                                   // 染まり中〜満タン → 赤（だんだん濃く・大きく）
        el.textContent = "❤️";
        el.style.opacity = (0.35 + 0.65*f).toFixed(2);
        el.style.transform = "scale(" + (0.8 + 0.2*f).toFixed(2) + ")";
        if (f >= 1) nowFull++;
      }
    });
    // 新しく満タンになったハートをポンッと跳ねさせる
    if (animate && nowFull > prevFull && nowFull > 0){
      const el = heartEls[nowFull-1];
      el.classList.remove("justfilled"); void el.offsetWidth; el.classList.add("justfilled");
    }
    prevFull = nowFull;
  }
  function save(){ localStorage.setItem(KEY_AFF, String(affection)); }

  // ---- コイン ----
  const KEY_COIN = "petApp.coins";
  let coins = parseInt(localStorage.getItem(KEY_COIN) || "0", 10);
  if (isNaN(coins)) coins = 0;
  const coinBadge   = document.getElementById("coinBadge");
  const rewardEl    = document.getElementById("reward");
  const coinNumEls  = [...document.querySelectorAll(".coinNum")];
  function renderCoins(bump){
    coinNumEls.forEach(el => el.textContent = coins);
    if (bump){
      document.querySelectorAll(".coin-badge").forEach(b => {
        b.classList.remove("bump"); void b.offsetWidth; b.classList.add("bump");
      });
    }
  }
  function saveCoins(){ localStorage.setItem(KEY_COIN, String(coins)); }

  // ---- 餌（ごはん）＆ おみせ ----
  const FOODS = [
    { id:"meat",   name:"ぶたにく", img:"assets/meat.png"   },
    { id:"fish",   name:"サケ",     img:"assets/fish.png"   },
    { id:"carrot", name:"にんじん", img:"assets/carrot.png" },
    { id:"tane",   name:"たね",     img:"assets/tane.png"   },
    { id:"bone",   name:"ほね",     img:"assets/bone.png"   },
  ];
  const PRICE = 10;
  const KEY_INV = "petApp.inventory";
  let inventory = {};
  try { inventory = JSON.parse(localStorage.getItem(KEY_INV) || "{}") || {}; } catch(e){ inventory = {}; }
  FOODS.forEach(f => { if (typeof inventory[f.id] !== "number") inventory[f.id] = 0; });
  function saveInv(){ localStorage.setItem(KEY_INV, JSON.stringify(inventory)); }

  const shopGrid = document.getElementById("shopGrid");
  function renderShop(){
    shopGrid.innerHTML = "";
    FOODS.forEach(f => {
      const card = document.createElement("div");
      card.className = "food-card";
      card.innerHTML =
        (inventory[f.id] > 0 ? '<span class="have">×'+inventory[f.id]+'</span>' : '') +
        '<img src="'+f.img+'" alt="'+f.name+'">' +
        '<div class="fname">'+f.name+'</div>' +
        '<button class="buy-btn"><span class="coin"></span>'+PRICE+'</button>';
      card.querySelector(".buy-btn").addEventListener("click", () => buy(f, card));
      shopGrid.appendChild(card);
    });
    renderCoins();
  }
  function buy(f, card){
    const btn = card.querySelector(".buy-btn");
    if (coins < PRICE){
      btn.classList.remove("shake"); void btn.offsetWidth; btn.classList.add("shake");
      if (navigator.vibrate) navigator.vibrate([30,30,30]);
      return;
    }
    coins -= PRICE; saveCoins();
    inventory[f.id] += 1; saveInv();
    if (navigator.vibrate) navigator.vibrate(20);
    flyFood(f.img, card.querySelector("img"));
    renderShop();
  }
  // 買った餌がコインのほうへ飛ぶ演出
  function flyFood(src, fromImg){
    const r = fromImg.getBoundingClientRect();
    const badge = document.querySelector("#shop .coin-badge");
    const t = badge.getBoundingClientRect();
    const el = document.createElement("img");
    el.src = src; el.className = "fly-food";
    el.style.left = (r.left + r.width/2 - 35) + "px";
    el.style.top  = (r.top + r.height/2 - 35) + "px";
    document.body.appendChild(el);
    el.animate([
      { transform:"translate(0,0) scale(1)", opacity:1 },
      { transform:`translate(${t.left + t.width/2 - r.left - r.width/2}px,${t.top + t.height/2 - r.top - r.height/2}px) scale(.3)`, opacity:0 }
    ], { duration:600, easing:"cubic-bezier(.5,0,.6,1)" });
    setTimeout(() => el.remove(), 650);
  }

  // ---- ごはんバー（care画面） ----
  const foodBar = document.getElementById("foodBar");
  function renderFoodBar(){
    foodBar.innerHTML = "";
    FOODS.forEach(f => {
      const has = inventory[f.id] > 0;
      const slot = document.createElement("div");
      slot.className = "food-slot" + (has ? "" : " empty");
      slot.innerHTML = '<img src="'+f.img+'" alt="'+f.name+'">' +
        (has ? '<span class="cnt">×'+inventory[f.id]+'</span>' : '');
      slot.addEventListener("click", () => feed(f, slot));
      foodBar.appendChild(slot);
    });
  }

  let rewarding = false;
  function giveReward(){
    rewarding = true;
    coins += 10; saveCoins();
    rewardEl.classList.add("show");
    coinBurst();
    if (navigator.vibrate) navigator.vibrate([20,40,20,40,70]);
    setTimeout(() => renderCoins(true), 350);          // カウントを+10して跳ねる
    setTimeout(() => {                                  // 演出おわり→メーターをリセットして再挑戦
      rewardEl.classList.remove("show");
      affection = 0; save();
      prevFull = -1; renderMeter(false);
      rewarding = false;
    }, 1600);
  }
  function coinBurst(){
    const r = document.getElementById("care").getBoundingClientRect();
    const cx = r.width/2, cy = r.height/2;
    for (let i=0;i<12;i++){
      const c = document.createElement("div");
      c.className = "coin-burst"; c.innerHTML = '<span class="coin"></span>';
      c.style.fontSize = (30 + Math.random()*16) + "px";
      c.style.left = cx + "px"; c.style.top = cy + "px";
      document.getElementById("care").appendChild(c);
      const ang = Math.PI*2*(i/12) + Math.random()*0.5;
      const dist = 120 + Math.random()*100;
      c.animate([
        { transform:"translate(-50%,-50%) translate(0,0) scale(.4)", opacity:0 },
        { transform:`translate(-50%,-50%) translate(${Math.cos(ang)*dist*0.5}px,${Math.sin(ang)*dist*0.5-40}px) scale(1.2)`, opacity:1, offset:.3 },
        { transform:`translate(-50%,-50%) translate(${Math.cos(ang)*dist}px,${Math.sin(ang)*dist+70}px) scale(.85)`, opacity:0 }
      ], { duration:950 + Math.random()*250, easing:"cubic-bezier(.2,.8,.3,1)" });
      setTimeout(() => c.remove(), 1300);
    }
  }

  // ペットにごはんをあげる
  function feed(f, slot){
    if (inventory[f.id] <= 0){
      slot.animate(
        [{transform:"translateY(0)"},{transform:"translateY(-8px)"},{transform:"translateY(0)"}],
        {duration:300, easing:"ease"}
      );
      return;
    }
    if (rewarding) return;
    inventory[f.id] -= 1; saveInv();
    renderFoodBar();

    // 餌がペットの口元へ飛んでいく
    const sr = slot.getBoundingClientRect();
    const pr = petImg.getBoundingClientRect();
    const fly = document.createElement("img");
    fly.src = f.img; fly.className = "fly-food";
    fly.style.left = (sr.left + sr.width/2 - 35) + "px";
    fly.style.top  = (sr.top + sr.height/2 - 35) + "px";
    document.body.appendChild(fly);
    fly.animate([
      { transform:"translate(0,0) scale(1)", opacity:1 },
      { transform:`translate(${pr.left + pr.width/2 - sr.left - sr.width/2}px,${pr.top + pr.height*0.55 - sr.top - sr.height/2}px) scale(1.1)`, opacity:1, offset:.7 },
      { transform:`translate(${pr.left + pr.width/2 - sr.left - sr.width/2}px,${pr.top + pr.height*0.55 - sr.top - sr.height/2}px) scale(.2)`, opacity:0 }
    ], { duration:650, easing:"cubic-bezier(.4,0,.5,1)" });
    setTimeout(() => fly.remove(), 700);

    // もぐもぐ → よろこぶ
    setTimeout(() => {
      petImg.classList.remove("wiggle"); void petImg.offsetWidth; petImg.classList.add("wiggle");
      if (navigator.vibrate) navigator.vibrate([15,30,15]);
      talk.textContent = "もぐもぐ♪";
      talk.classList.remove("show"); void talk.offsetWidth; talk.classList.add("show");
      clearTimeout(talkTimer);
      talkTimer = setTimeout(()=>talk.classList.remove("show"), 1000);

      affection = Math.min(100, affection + 20);   // ごはんはなつき度アップ大
      save(); renderMeter(true);
      if (affection >= 100 && !rewarding){ setTimeout(giveReward, 500); }
    }, 560);
  }

  // ---- 画面遷移 ----
  document.getElementById("startBtn").addEventListener("click", () => show("choose"));
  document.querySelectorAll("[data-shop]").forEach(b => b.addEventListener("click", () => show("shop")));
  document.getElementById("shopBack").addEventListener("click", () => show(prevScreen));

  document.querySelectorAll(".pet-card").forEach(card => {
    card.addEventListener("click", () => {
      const pet = card.dataset.pet;
      if (card.classList.contains("locked")) { wobble(card); return; }
      localStorage.setItem(KEY_PET, pet);
      renderMeter();
      show("care");
    });
  });
  document.getElementById("backBtn").addEventListener("click", () => show("choose"));

  function wobble(el){
    el.animate(
      [{transform:"rotate(0)"},{transform:"rotate(-4deg)"},{transform:"rotate(4deg)"},{transform:"rotate(0)"}],
      {duration:300, easing:"ease"}
    );
  }

  // ---- なでる ----
  const petImg = document.getElementById("petImg");
  const stage  = document.getElementById("stage");
  const talk   = document.getElementById("talk");
  const messages = ["だいすき！","うれしい！","もっと！","クゥ～ン♪","えへへ"];

  function spawnHearts(clientX, clientY){
    const rect = stage.getBoundingClientRect();
    const x = clientX - rect.left, y = clientY - rect.top;
    const n = 3 + Math.floor(Math.random()*2); // 3〜4個
    for (let i=0;i<n;i++){
      const el = document.createElement("img");
      el.src = "assets/heart.png"; el.alt = "";
      el.className = "float-heart";
      const size = 40 + Math.random()*28;        // 40〜68px とサイズもバラつかせる
      el.style.width = size + "px";
      el.style.left = (x + (Math.random()*70-35)) + "px";
      el.style.top  = (y + (Math.random()*30-15)) + "px";
      el.style.animationDuration = (0.8 + Math.random()*0.5) + "s";
      stage.appendChild(el);
      el.addEventListener("animationend", () => el.remove());
    }
  }

  let talkTimer = null;
  function pet(clientX, clientY){
    spawnHearts(clientX, clientY);
    petImg.classList.remove("wiggle");
    void petImg.offsetWidth;        // reflow → アニメ再生
    petImg.classList.add("wiggle");
    if (navigator.vibrate) navigator.vibrate(15);

    affection = Math.min(100, affection + 8);
    save(); renderMeter(true);

    // なつき度MAX → 10コインのご褒美（演出後にメーターはリセット）
    if (affection >= 100 && !rewarding){
      setTimeout(giveReward, 450);   // 満タンのハートを見せてから
      return;
    }

    // ときどきセリフ
    if (Math.random() < 0.45){
      talk.textContent = messages[Math.floor(Math.random()*messages.length)];
      talk.classList.remove("show"); void talk.offsetWidth; talk.classList.add("show");
      clearTimeout(talkTimer);
      talkTimer = setTimeout(()=>talk.classList.remove("show"), 900);
    }
  }

  // タップ／ドラッグ両対応（ドラッグ中は少し間引く）
  let lastPet = 0;
  function onMove(e){
    const now = Date.now();
    if (now - lastPet < 220) return;
    lastPet = now;
    const p = e.touches ? e.touches[0] : e;
    pet(p.clientX, p.clientY);
  }
  petImg.addEventListener("pointerdown", e => { e.preventDefault(); pet(e.clientX, e.clientY); lastPet = Date.now(); });
  petImg.addEventListener("pointermove", e => { if (e.pressure > 0 || e.buttons) onMove(e); });
  petImg.addEventListener("dragstart", e => e.preventDefault());

  renderMeter();
  renderCoins();
</script>
</body>
</html>
